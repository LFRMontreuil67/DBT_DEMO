version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: ordered_at
        tests:
          - not_null
      - name: store_id
      - name: subtotal
        tests:
          - not_null
      - name: tax_paid
        tests:
          - not_null
      - name: order_total
        tests:
          - not_null
